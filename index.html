<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rendu workshop 3js</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sigmar&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sigmar&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <button class="vue-ensemble-button glass-effect">
        Vue d'ensemble
    </button>
    <div class="infos-container glass-effect hidden">
        <h1 class="nom-div"></h1>
      <table data-fr-js-table-element="true" class="info-container-table">
        <tbody>
          <tr>
            <td>Distance au Soleil<strong> </strong></td>
            <td class="distance-soleil-div"></td>
          </tr>
        
          <tr>
            <td>Masse</td>
            <td class="masse-div"></td>
          </tr>
          <tr>
            <td>Diamètre</td>
            <td class="diametre-div"> </td>
          </tr>
          <tr>
            <td>Gravité</td>
            <td class="gravite-div"></td>
          </tr>
          <tr>
            <td>Inclinaison de l’axe de rotation</td>
            <td class="inclinaison-axe-rotation-div"> </td>
          </tr>
          <tr>
            <td>Durée de révolution</td>
            <td class="duree-revolution-div"></td>
          </tr>
          <tr>
            <td>Durée de rotation</td>
            <td class="duree-rotation-div"></td>
          </tr>
          <tr>
            <td>Température</td>
            <td class="temperature-div"></td>
          </tr>
          <tr id="no-underline">
            <td>Nombre de lunes connues</td>
            <td class="nombre-lunes-div"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@latest/build/three.module.js",
              "three/addons/": "https://unpkg.com/three@latest/examples/jsm/"
            }
          }
       </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
